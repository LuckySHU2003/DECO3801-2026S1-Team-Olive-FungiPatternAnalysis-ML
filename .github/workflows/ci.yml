name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Basic Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "Current files:"
          find . -maxdepth 3 -type f | sort

      - name: Frontend placeholder
        run: |
          if [ -d "frontend" ]; then
            echo "Frontend folder found."
          else
            echo "No frontend folder yet. Skipping frontend checks."
          fi

      - name: Backend placeholder
        run: |
          if [ -d "backend" ]; then
            echo "Backend folder found."
          else
            echo "No backend folder yet. Skipping backend checks."
          fi

      - name: CI placeholder success
        run: echo "Basic CI passed."

      - name: Tests placeholder
        run: |
          if [ -d "integration-tests" ] || [ -d "backend/tests" ] || [ -d "frontend/tests" ]; then
            echo "Test structure detected"
          else
            echo "No tests yet (ok for now)"
          fi

      - name: CI success
        run: echo "CI passed"